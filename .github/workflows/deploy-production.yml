name: Deploy to production

on:
  push:
    branches: [main]
    paths:
      - 'LARAVEL_BACKEND/**'
      - '.github/workflows/deploy-production.yml'
  workflow_dispatch:
    inputs:
      skip_health_check:
        description: Skip post-deploy health check
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy to server
    needs: ci
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://savitchat.savitglobalsolutions.com
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo, bcmath, xml, ctype, json, tokenizer, openssl
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: LARAVEL_BACKEND/package-lock.json

      - name: Build release bundle
        working-directory: LARAVEL_BACKEND
        run: |
          composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist
          npm ci
          npm run build

      - name: Configure SSH
        run: |
          install -m 700 -d ~/.ssh
          echo "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.PROD_SSH_PORT || 22 }}" -H "${{ secrets.PROD_SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Sync files to server
        env:
          SSH_PORT: ${{ secrets.PROD_SSH_PORT || 22 }}
          SSH_USER: ${{ secrets.PROD_SSH_USER }}
          SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          DEPLOY_PATH: ${{ secrets.PROD_DEPLOY_PATH }}
        run: |
          rsync -az --delete \
            --exclude '.env' \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude 'tests' \
            --exclude 'test-results' \
            --exclude 'storage/logs/*' \
            --exclude 'storage/framework/cache/data/*' \
            --exclude 'storage/framework/sessions/*' \
            --exclude 'storage/framework/views/*' \
            --exclude '.phpunit.result.cache' \
            -e "ssh -i ~/.ssh/deploy_key -p ${SSH_PORT} -o StrictHostKeyChecking=accept-new" \
            LARAVEL_BACKEND/ "${SSH_USER}@${SSH_HOST}:${DEPLOY_PATH}/"

      - name: Run post-deploy on server
        env:
          SSH_PORT: ${{ secrets.PROD_SSH_PORT || 22 }}
          SSH_USER: ${{ secrets.PROD_SSH_USER }}
          SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          DEPLOY_PATH: ${{ secrets.PROD_DEPLOY_PATH }}
        run: |
          ssh -i ~/.ssh/deploy_key -p "${SSH_PORT}" -o StrictHostKeyChecking=accept-new \
            "${SSH_USER}@${SSH_HOST}" \
            "cd '${DEPLOY_PATH}' && bash scripts/post-deploy.sh"

      - name: Health check
        if: github.event.inputs.skip_health_check != 'true'
        run: |
          for i in 1 2 3 4 5; do
            if curl -fsS "https://savitchat.savitglobalsolutions.com/up" > /dev/null; then
              echo "Health check passed."
              exit 0
            fi
            echo "Waiting for app to respond (attempt ${i}/5)..."
            sleep 10
          done
          echo "Health check failed after deploy."
          exit 1
